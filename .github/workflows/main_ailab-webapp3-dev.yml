name: Deploy Python 3.12 App to Azure Web App - ailab-webapp3-dev

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write      # OIDC 登录必需
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制 Node 24 避免 warning

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - uses: actions/checkout@v4

      # 2️⃣ 设置 Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3️⃣ 安装依赖到本地目录
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target="./.python_packages/lib/site-packages"

      # 4️⃣ 打包应用（排除缓存和虚拟环境）
      - name: Zip artifact
        run: |
          zip -r app.zip . -x "*.git*" -x "__pycache__/*" -x ".python_packages/lib/site-packages/__pycache__/*"

      # 5️⃣ Azure 登录（OIDC）
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 6️⃣ 部署到 Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ailab-webapp3-dev'
          package: app.zip
    
